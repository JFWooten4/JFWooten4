<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>John Wooten</title>
  <style>
    html, body {
      background-color: black;
      color: white;
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: larger;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    body {
      position: relative;
      overflow: hidden;
    }
    /* Slow crossfading group-photo background behind the landing page content. */
    .background-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .background-layer {
      position: absolute;
      inset: -3%;
      background-position: center 50%;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 4.2s ease-in-out;
      will-change: opacity;
    }
    .background-layer.is-visible {
      opacity: 0.28;
    }
    .background-shade {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.56)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.54));
    }
    .background-credit {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .background-credit-card {
      max-width: min(680px, calc(100vw - 36px));
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(10, 8, 16, 0.48);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.26);
      text-align: left;
      pointer-events: auto;
    }
    .background-credit-label {
      display: block;
      width: 100%;
      margin: 0 0 4px;
      color: #AC51FF;
      font-size: 0.66rem;
      letter-spacing: 0.03em;
      text-transform: none;
      text-align: center;
    }
    .background-credit-text {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.45;
      color: #f6f2fb;
      min-height: 1.5em;
    }
    .background-credit-text.is-typing {
      font-family: "Courier New", monospace;
      letter-spacing: 0.015em;
      opacity: 0.94;
    }
    .background-credit-text a {
      color: #AC51FF;
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      transform: translateY(-20px);
    }
    h2 {
      font-family: Verdana, sans-serif;
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    h3 {
      font-family: Georgia, serif;
      margin-top: 45px;
      font-weight: 600;
    }
    a {
      color: #AC51FF;
      font-weight: bold;
    }
    .content p {
      margin-top: 0;
      margin-bottom: 24px;
    }
    .social-links {
      margin-top: 0;
      margin-bottom: 30px;
      list-style: none;
      padding: 0 25px 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }
    .social-links a {
      margin: 0 20px;
      display: inline-block;
    }
    .social-links img,
    .social-links svg {
      width: 20px;
    }
    .sponsors {
      margin-top: 36px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .sponsors h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .sponsor-list {
      list-style: none;
      padding: 0;
      margin: 0 0 6px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .sponsor-list a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid #2d203c;
      border-radius: 999px;
      background: rgba(172, 81, 255, 0.08);
      text-decoration: none;
      color: white;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
    }
    .sponsor-list img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: block;
    }
    .group-album {
      margin-top: 84px;
    }
    .group-label {
      margin: 0 0 4px;
      color: #AC51FF;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      text-align: center;
    }
    .group-strip {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .group-thumb {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      padding: 0;
      border-radius: 18px;
      overflow: hidden;
      width: 108px;
      height: 72px;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, width 220ms ease, height 220ms ease;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }
    .group-thumb:hover,
    .group-thumb:focus-visible {
      width: 152px;
      height: 102px;
      transform: translateY(-3px);
      border-color: rgba(172, 81, 255, 0.5);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      outline: none;
    }
    .group-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 30px;
      background: rgba(0, 0, 0, 0.84);
      z-index: 20;
      backdrop-filter: blur(12px);
    }
    .lightbox.is-open {
      display: flex;
    }
    .lightbox-frame {
      position: relative;
      max-width: min(92vw, 1180px);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: min(72vh, 88vw);
      border-radius: 22px;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.45);
    }
    .lightbox-info {
      max-width: min(92vw, 720px);
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(15, 12, 22, 0.82);
      color: #f4effa;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.84rem;
      line-height: 1.45;
      text-align: left;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }
    .lightbox-info a {
      color: #AC51FF;
    }
    .lightbox-close,
    .lightbox-nav {
      appearance: none;
      border: 0;
      background: rgba(20, 14, 29, 0.72);
      color: white;
      cursor: pointer;
      font-size: 1.8rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 64px;
      border-radius: 16px;
    }
    .lightbox-nav.prev {
      left: -58px;
    }
    .lightbox-nav.next {
      right: -58px;
    }
    @media (max-width: 720px) {
      .content {
        padding: 28px 18px 96px;
      }
      .group-thumb {
        width: 92px;
        height: 62px;
      }
      .group-thumb:hover,
      .group-thumb:focus-visible {
        width: 122px;
        height: 82px;
      }
      .lightbox {
        padding: 18px;
      }
      .lightbox-frame {
        gap: 10px;
      }
      .lightbox-image {
        max-height: min(64vh, 92vw);
      }
      .lightbox-info {
        font-size: 0.78rem;
        padding: 10px 12px;
      }
      .lightbox-nav.prev {
        left: 8px;
      }
      .lightbox-nav.next {
        right: 8px;
      }
      .lightbox-close {
        top: 8px;
        right: 8px;
      }
      .background-credit {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }
      .background-credit-card {
        padding: 8px 10px;
        border-radius: 14px;
      }
      .background-credit-text {
        font-size: 0.76rem;
      }
    }
  </style>
</head>

  <script type="application/json" id="group-image-data">
    [
      {% assign group_keys = "stellar-consensus,original-whydrs" | split: "," %}
      {% assign group_index = 0 %}
      {% for group_key in group_keys %}
      {% for file in site.static_files %}
      {% assign file_key = file.name | split: '.' | first %}
      {% if file.path contains '/groups/' and file_key == group_key %}
      {% if group_index > 0 %},{% endif %}
      {
        "key": "{{ group_key }}",
        "src": "{{ file.path }}",
        "thumbnailSrc": "/groups/bgs/{{ group_key }}.webp",
        "alt": "Group photo {{ group_index | plus: 1 }}",
        "position": "center 54%"
      }
      {% assign group_index = group_index | plus: 1 %}
      {% break %}
      {% endif %}
      {% endfor %}
      {% endfor %}
    ]
  </script>

  <script>
    (function () {
      var sponsorList = document.getElementById("sponsor-list");

      if (!sponsorList) {
        return;
      }

      fetch("/var/sponsors.json", { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Failed to load sponsor feed");
          }
          return response.json();
        })
        .then(function (data) {
          var sponsors = Array.isArray(data.sponsors) ? data.sponsors : [];

          sponsors.sort(function (left, right) {
            var leftLabel = (left.name || left.login || "").toLowerCase();
            var rightLabel = (right.name || right.login || "").toLowerCase();
            return leftLabel.localeCompare(rightLabel);
          });

          sponsorList.innerHTML = "";

          if (!sponsors.length) {
            return;
          }

          sponsors.forEach(function (sponsor) {
            var item = document.createElement("li");
            var link = document.createElement("a");
            var avatar = document.createElement("img");
            var label = document.createElement("span");

            link.href = sponsor.url;
            link.target = "_blank";
            link.rel = "noreferrer";

            avatar.src = sponsor.avatar_url;
            avatar.alt = sponsor.name || sponsor.login;

            label.textContent = sponsor.name || sponsor.login;

            link.appendChild(avatar);
            link.appendChild(label);
            item.appendChild(link);
            sponsorList.appendChild(item);
          });
        })
        .catch(function () {});
    })();

    (function () {
      var groupImageData = document.getElementById("group-image-data");
      var groupCreditData = document.getElementById("group-credit-data");
      var groupStrip = document.getElementById("group-strip");
      var lightbox = document.getElementById("group-lightbox");
      var lightboxImage = document.getElementById("lightbox-image");
      var lightboxInfo = document.getElementById("lightbox-info");
      var closeButton = document.getElementById("lightbox-close");
      var prevButton = document.getElementById("lightbox-prev");
      var nextButton = document.getElementById("lightbox-next");
      var images = [];
      var creditsByKey = {};
      var currentIndex = 0;

      if (!groupImageData || !groupStrip || !lightbox || !lightboxImage || !lightboxInfo || !closeButton || !prevButton || !nextButton) {
        return;
      }

      try {
        images = JSON.parse(groupImageData.textContent);
      } catch (error) {
        images = [];
      }

      if (groupCreditData) {
        try {
          creditsByKey = JSON.parse(groupCreditData.textContent);
        } catch (error) {
          creditsByKey = {};
        }
      }

      if (!images.length) {
        images = [
          {
            key: "stellar-consensus",
            src: "/groups/stellar-consensus.jpg",
            thumbnailSrc: "/groups/bgs/stellar-consensus.webp",
            alt: "Group photo 1",
            position: "center 54%"
          },
          {
            key: "original-whydrs",
            src: "/groups/original-whydrs.png",
            thumbnailSrc: "/groups/bgs/original-whydrs.webp",
            alt: "Group photo 2",
            position: "center 54%"
          }
        ];
      }

      groupStrip.innerHTML = "";

      images.forEach(function (image, index) {
        var thumbnail = document.createElement("button");
        var thumbnailImage = document.createElement("img");

        thumbnail.className = "group-thumb";
        thumbnail.type = "button";
        thumbnail.setAttribute("data-lightbox-index", String(index));
        thumbnail.setAttribute("aria-label", "Open " + image.alt.toLowerCase());

        thumbnailImage.src = image.thumbnailSrc || image.src;
        thumbnailImage.alt = image.alt;
        thumbnailImage.loading = "lazy";

        thumbnail.appendChild(thumbnailImage);
        groupStrip.appendChild(thumbnail);
      });

      var thumbnails = Array.prototype.slice.call(document.querySelectorAll("[data-lightbox-index]"));

      function showImage(index) {
        currentIndex = (index + images.length) % images.length;

        if (!images[currentIndex]) {
          return;
        }

        lightboxImage.src = images[currentIndex].src;
        lightboxImage.alt = images[currentIndex].alt;
        lightboxInfo.innerHTML = (creditsByKey[images[currentIndex].key] && creditsByKey[images[currentIndex].key].html) || "Credit unavailable.";
      }

      function openLightbox(index) {
        showImage(index);
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightbox.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      thumbnails.forEach(function (thumbnail, index) {
        thumbnail.addEventListener("click", function () {
          openLightbox(index);
        });
      });

      prevButton.addEventListener("click", function () {
        showImage(currentIndex - 1);
      });

      nextButton.addEventListener("click", function () {
        showImage(currentIndex + 1);
      });

      closeButton.addEventListener("click", closeLightbox);

      lightbox.addEventListener("click", function (event) {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (!lightbox.classList.contains("is-open")) {
          return;
        }

        if (event.key === "Escape") {
          closeLightbox();
        } else if (event.key === "ArrowLeft") {
          showImage(currentIndex - 1);
        } else if (event.key === "ArrowRight") {
          showImage(currentIndex + 1);
        }
      });
    })();

    (function () {
      // Rotate the available background images through two layers so the
      // landing page gets a slow, low-opacity crossfade instead of a hard swap.
      var backgroundCreditText = document.getElementById("background-credit-text");
      var images = Array.isArray(window.homepageBackgroundImages) ? window.homepageBackgroundImages : [];
      var creditsByName = window.homepageBackgroundCredits || {};
      var creditAnimationTimeout = null;
      var creditAnimationInterval = null;

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getImageKey(src) {
        if (!src) {
          return "";
        }

        var filename = src.split("/").pop() || "";
        return filename.replace(/\.[^.]+$/, "");
      }

      function formatLink(label, href) {
        return '<a href="' + escapeHtml(href) + '" target="_blank" rel="noreferrer">' + escapeHtml(label) + "</a>";
      }

      function buildCreditContent(imageEntry) {
        var credit = creditsByName[imageEntry.key || getImageKey(imageEntry.src)] || {};
        var artistLabel = credit.artist || "Unknown artist";
        var artistHtml = credit.artistUrl ? formatLink(artistLabel, credit.artistUrl) : escapeHtml(artistLabel);
        var artistText = "Art by " + artistLabel;
        var parts = ["Art by " + artistHtml];
        var textParts = [artistText];

        if (credit.sourceUrl) {
          parts.push(formatLink("src", credit.sourceUrl));
          textParts.push("src");
        }

        return {
          html: parts.join(" · "),
          text: textParts.join(" · ")
        };
      }

      function clearCreditAnimation() {
        if (creditAnimationTimeout) {
          window.clearTimeout(creditAnimationTimeout);
          creditAnimationTimeout = null;
        }

        if (creditAnimationInterval) {
          window.clearInterval(creditAnimationInterval);
          creditAnimationInterval = null;
        }
      }

      function updateCredit(imageEntry, useAnimation) {
        if (!backgroundCreditText || !imageEntry) {
          return;
        }

        var content = buildCreditContent(imageEntry);

        if (!useAnimation) {
          clearCreditAnimation();
          backgroundCreditText.classList.remove("is-typing");
          backgroundCreditText.innerHTML = content.html;
          return;
        }

        clearCreditAnimation();

        var currentText = backgroundCreditText.textContent || content.text;
        var eraseIndex = currentText.length;
        var writeIndex = 0;
        var eraseStepMs = 40;
        var writeStepMs = 42;

        backgroundCreditText.classList.add("is-typing");
        backgroundCreditText.textContent = currentText;

        creditAnimationInterval = window.setInterval(function () {
          eraseIndex -= 1;
          backgroundCreditText.textContent = currentText.slice(0, Math.max(eraseIndex, 0));

          if (eraseIndex <= 0) {
            window.clearInterval(creditAnimationInterval);
            creditAnimationInterval = null;

            creditAnimationTimeout = window.setTimeout(function () {
              creditAnimationInterval = window.setInterval(function () {
                writeIndex += 1;
                backgroundCreditText.textContent = content.text.slice(0, writeIndex);

                if (writeIndex >= content.text.length) {
                  window.clearInterval(creditAnimationInterval);
                  creditAnimationInterval = null;
                  backgroundCreditText.classList.remove("is-typing");
                  backgroundCreditText.innerHTML = content.html;
                }
              }, writeStepMs);
            }, 220);
          }
        }, eraseStepMs);
      }

      var layerA = document.getElementById("bg-layer-a");
      var layerB = document.getElementById("bg-layer-b");

      if (!layerA || !layerB || !images.length) {
        return;
      }

      var activeLayer = layerA;
      var inactiveLayer = layerB;
      var imageIndex = Math.floor(Math.random() * images.length);
      var swapDelayMs = 8000;
      var fadeDurationMs = 4200;
      var creditLeadMs = 1900;
      var preloadDelayMs = 600;
      var imageCache = {};

      function preload(imageEntry) {
        if (imageCache[imageEntry.src]) {
          return imageCache[imageEntry.src];
        }

        imageCache[imageEntry.src] = new Promise(function (resolve) {
          var image = new Image();

          function finish() {
            if (typeof image.decode === "function") {
              image.decode().catch(function () {
                return null;
              }).then(function () {
                resolve(imageEntry);
              });
              return;
            }

            resolve(imageEntry);
          }

          image.onload = finish;
          image.onerror = function () {
            resolve(imageEntry);
          };
          image.src = imageEntry.src;

          if (image.complete) {
            finish();
          }
        });

        return imageCache[imageEntry.src];
      }

      function applyBackground(layer, imageEntry) {
        layer.style.backgroundImage = 'url("' + imageEntry.src + '")';
        layer.style.backgroundPosition = imageEntry.position;
      }

      applyBackground(activeLayer, images[imageIndex]);
      updateCredit(images[imageIndex], false);

      if (images.length < 2) {
        return;
      }

      function scheduleNextFade() {
        window.setTimeout(function () {
          var nextIndex = (imageIndex + 1) % images.length;

          preload(images[nextIndex]).then(function (nextImage) {
            applyBackground(inactiveLayer, nextImage);

            // Force the browser to register the new background before opacity changes.
            inactiveLayer.offsetHeight;

            inactiveLayer.classList.add("is-visible");
            activeLayer.classList.remove("is-visible");

            imageIndex = nextIndex;

            var previous = activeLayer;
            activeLayer = inactiveLayer;
            inactiveLayer = previous;

            window.setTimeout(function () {
              updateCredit(nextImage, true);
            }, creditLeadMs);

            scheduleNextFade();
          });
        }, swapDelayMs);
      }

      window.setTimeout(function () {
        images.forEach(function (imageEntry, index) {
          if (index !== imageIndex) {
            preload(imageEntry);
          }
        });
      }, preloadDelayMs);

      scheduleNextFade();
    })();
  </script>
