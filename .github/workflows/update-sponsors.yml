name: Update Sponsors

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh sponsor data
        env:
          SPONSORS_GH_TOKEN: ${{ secrets.SPONSORS_GH_TOKEN }}
          SPONSORS_LOGIN: JFWooten4
        run: python var/update-sponsors.py

      - name: Commit updated sponsor data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add var/sponsors.json
          git diff --cached --quiet && exit 0
          git commit -m "Update sponsor feed"
          git push
