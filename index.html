<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>John Wooten Info</title>
  <style>
    html, body {
      background-color: black;
      color: white;
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: larger;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    body {
      position: relative;
      overflow: hidden;
    }
    /* Slow crossfading group-photo background behind the landing page content. */
    .background-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .background-layer {
      position: absolute;
      inset: -3%;
      background-position: center 50%;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 4.8s ease-in-out;
      will-change: opacity;
    }
    .background-layer.is-visible {
      opacity: 0.28;
    }
    .background-shade {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.56)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.54));
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
    }
    h2 {
      font-family: Verdana, sans-serif;
      margin-top: 45px;
      margin-bottom: 0px;
      font-weight: 600;
    }
    h3 {
      font-family: Georgia, serif;
      margin-top: 45px;
      font-weight: 600;
    }
    a {
      color: #AC51FF;
      font-weight: bold;
    }
    .social-links {
      margin-top: 30px;
      margin-bottom: 30px;
      list-style: none;
      padding: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }
    .social-links a {
      margin: 0 20px;
      display: inline-block;
    }
    .social-links img,
    .social-links svg {
      width: 20px;
    }
    .sponsors {
      margin-top: 36px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .sponsors h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .sponsor-list {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .sponsor-list a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid #2d203c;
      border-radius: 999px;
      background: rgba(172, 81, 255, 0.08);
      text-decoration: none;
      color: white;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
    }
    .sponsor-list img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: block;
    }
    .group-album {
      margin-top: 22px;
    }
    .group-album h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: #ddd2ea;
    }
    .group-strip {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .group-thumb {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      padding: 0;
      border-radius: 18px;
      overflow: hidden;
      width: 108px;
      height: 72px;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, width 220ms ease, height 220ms ease;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }
    .group-thumb:hover,
    .group-thumb:focus-visible {
      width: 152px;
      height: 102px;
      transform: translateY(-3px);
      border-color: rgba(172, 81, 255, 0.5);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      outline: none;
    }
    .group-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 30px;
      background: rgba(0, 0, 0, 0.84);
      z-index: 20;
      backdrop-filter: blur(12px);
    }
    .lightbox.is-open {
      display: flex;
    }
    .lightbox-frame {
      position: relative;
      max-width: min(92vw, 1180px);
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: 88vh;
      border-radius: 22px;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.45);
    }
    .lightbox-close,
    .lightbox-nav {
      appearance: none;
      border: 0;
      background: rgba(20, 14, 29, 0.72);
      color: white;
      cursor: pointer;
      font-size: 1.8rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 64px;
      border-radius: 16px;
    }
    .lightbox-nav.prev {
      left: -58px;
    }
    .lightbox-nav.next {
      right: -58px;
    }
    @media (max-width: 720px) {
      .content {
        padding: 28px 18px;
      }
      .group-thumb {
        width: 92px;
        height: 62px;
      }
      .group-thumb:hover,
      .group-thumb:focus-visible {
        width: 122px;
        height: 82px;
      }
      .lightbox {
        padding: 18px;
      }
      .lightbox-nav.prev {
        left: 8px;
      }
      .lightbox-nav.next {
        right: 8px;
      }
      .lightbox-close {
        top: 8px;
        right: 8px;
      }
    }
  </style>
</head>

  <script>
    (function () {
      var sponsorList = document.getElementById("sponsor-list");

      if (!sponsorList) {
        return;
      }

      fetch("/var/sponsors.json", { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Failed to load sponsor feed");
          }
          return response.json();
        })
        .then(function (data) {
          var sponsors = Array.isArray(data.sponsors) ? data.sponsors : [];
          sponsorList.innerHTML = "";

          if (!sponsors.length) {
            return;
          }

          sponsors.forEach(function (sponsor) {
            var item = document.createElement("li");
            var link = document.createElement("a");
            var avatar = document.createElement("img");
            var label = document.createElement("span");

            link.href = sponsor.url;
            link.target = "_blank";
            link.rel = "noreferrer";

            avatar.src = sponsor.avatar_url;
            avatar.alt = sponsor.name || sponsor.login;

            label.textContent = sponsor.name || sponsor.login;

            link.appendChild(avatar);
            link.appendChild(label);
            item.appendChild(link);
            sponsorList.appendChild(item);
          });
        })
        .catch(function () {});
    })();

    (function () {
      var groupImageData = document.getElementById("group-image-data");
      var groupStrip = document.getElementById("group-strip");
      var lightbox = document.getElementById("group-lightbox");
      var lightboxImage = document.getElementById("lightbox-image");
      var closeButton = document.getElementById("lightbox-close");
      var prevButton = document.getElementById("lightbox-prev");
      var nextButton = document.getElementById("lightbox-next");
      var images = [];
      var currentIndex = 0;

      if (!groupImageData || !groupStrip || !lightbox || !lightboxImage || !closeButton || !prevButton || !nextButton) {
        return;
      }

      try {
        images = JSON.parse(groupImageData.textContent);
      } catch (error) {
        images = [];
      }

      if (!images.length) {
        images = [
          {
            src: "/groups/bgs/stellar-consensus.webp",
            alt: "Group photo 1",
            position: "center 54%"
          },
          {
            src: "/groups/bgs/original-whydrs.webp",
            alt: "Group photo 2",
            position: "center 54%"
          }
        ];
      }

      groupStrip.innerHTML = "";

      images.forEach(function (image, index) {
        var thumbnail = document.createElement("button");
        var thumbnailImage = document.createElement("img");

        thumbnail.className = "group-thumb";
        thumbnail.type = "button";
        thumbnail.setAttribute("data-lightbox-index", String(index));
        thumbnail.setAttribute("aria-label", "Open " + image.alt.toLowerCase());

        thumbnailImage.src = image.src;
        thumbnailImage.alt = image.alt;
        thumbnailImage.loading = "lazy";

        thumbnail.appendChild(thumbnailImage);
        groupStrip.appendChild(thumbnail);
      });

      var thumbnails = Array.prototype.slice.call(document.querySelectorAll("[data-lightbox-index]"));

      function showImage(index) {
        currentIndex = (index + images.length) % images.length;

        if (!images[currentIndex]) {
          return;
        }

        lightboxImage.src = images[currentIndex].src;
        lightboxImage.alt = images[currentIndex].alt;
      }

      function openLightbox(index) {
        showImage(index);
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightbox.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      thumbnails.forEach(function (thumbnail, index) {
        thumbnail.addEventListener("click", function () {
          openLightbox(index);
        });
      });

      prevButton.addEventListener("click", function () {
        showImage(currentIndex - 1);
      });

      nextButton.addEventListener("click", function () {
        showImage(currentIndex + 1);
      });

      closeButton.addEventListener("click", closeLightbox);

      lightbox.addEventListener("click", function (event) {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (!lightbox.classList.contains("is-open")) {
          return;
        }

        if (event.key === "Escape") {
          closeLightbox();
        } else if (event.key === "ArrowLeft") {
          showImage(currentIndex - 1);
        } else if (event.key === "ArrowRight") {
          showImage(currentIndex + 1);
        }
      });
    })();

    (function () {
      // Rotate the available group photos through two background layers so the
      // landing page gets a slow, low-opacity crossfade instead of a hard swap.
      var backgroundImageData = document.getElementById("background-image-data");
      var images = [];

      if (backgroundImageData) {
        try {
          images = JSON.parse(backgroundImageData.textContent);
        } catch (error) {
          images = [];
        }
      }

      if (!images.length) {
        images = [
          {
            src: "/groups/bgs/stellar-consensus.webp",
            alt: "Group photo 1",
            position: "center 54%"
          },
          {
            src: "/groups/bgs/original-whydrs.webp",
            alt: "Group photo 2",
            position: "center 54%"
          }
        ];
      }
      var layerA = document.getElementById("bg-layer-a");
      var layerB = document.getElementById("bg-layer-b");

      if (!layerA || !layerB || !images.length) {
        return;
      }

      var activeLayer = layerA;
      var inactiveLayer = layerB;
      var imageIndex = Math.floor(Math.random() * images.length);
      var swapDelayMs = 12000;
      var preloadDelayMs = 600;
      var imageCache = {};

      function preload(imageEntry) {
        if (imageCache[imageEntry.src]) {
          return imageCache[imageEntry.src];
        }

        imageCache[imageEntry.src] = new Promise(function (resolve) {
          var image = new Image();

          function finish() {
            if (typeof image.decode === "function") {
              image.decode().catch(function () {
                return null;
              }).then(function () {
                resolve(imageEntry);
              });
              return;
            }

            resolve(imageEntry);
          }

          image.onload = finish;
          image.onerror = function () {
            resolve(imageEntry);
          };
          image.src = imageEntry.src;

          if (image.complete) {
            finish();
          }
        });

        return imageCache[imageEntry.src];
      }

      function applyBackground(layer, imageEntry) {
        layer.style.backgroundImage = 'url("' + imageEntry.src + '")';
        layer.style.backgroundPosition = imageEntry.position;
      }

      applyBackground(activeLayer, images[imageIndex]);

      if (images.length < 2) {
        return;
      }

      function scheduleNextFade() {
        window.setTimeout(function () {
          var nextIndex = (imageIndex + 1) % images.length;

          preload(images[nextIndex]).then(function (nextImage) {
            applyBackground(inactiveLayer, nextImage);

            // Force the browser to register the new background before opacity changes.
            inactiveLayer.offsetHeight;

            inactiveLayer.classList.add("is-visible");
            activeLayer.classList.remove("is-visible");

            imageIndex = nextIndex;

            var previous = activeLayer;
            activeLayer = inactiveLayer;
            inactiveLayer = previous;

            scheduleNextFade();
          });
        }, swapDelayMs);
      }

      window.setTimeout(function () {
        images.forEach(function (imageEntry, index) {
          if (index !== imageIndex) {
            preload(imageEntry);
          }
        });
      }, preloadDelayMs);

      scheduleNextFade();
    })();
  </script>
</body>
</html>
